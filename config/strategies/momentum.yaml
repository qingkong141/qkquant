name: momentum
description: 绝对动量 + 风控层追踪止损（每日扫描，仓位上限 5，适配 3 万本金）

params:
  mom_window: 20
  entry_threshold: 0.03       # 过去 20 日 +3% 入场
  exit_threshold: -0.03       # 过去 20 日 -3% 信号反转离场
  drawdown_from_peak: 0.10    # 当前价距 20 日最高不能低于 90%
  max_positions: 5            # 与默认 3 万本金、100 股一手、集中度风控对齐
  min_price: 1.0
  adx_threshold: 20            # ADX 趋势强度过滤：<20 视为震荡市，禁止买入；0=关闭
  cooldown_days: 20            # 卖出后 N 天内不得重新买入同一只票；0=关闭
  adx_market_filter: true      # True=仅在 HS300<MA60 时启用 ADX，多头时不拦截
  min_float_cap: 2000000000    # 盘口：最小流通市值 20 亿（过滤微盘庄股）
  max_float_cap: 0             # 盘口：最大流通市值上限（0=不限）
  min_amount: 5000000          # 盘口：最小成交额 500 万（过滤无流动性票）

# 风控层（组合级 + 单票级）；trailing_stop 原先内置在策略里，现已下放。
risk:
  position_stop:
    enabled: true
    threshold: 0.08           # 单票从入场价跌 8% 硬止损
  trailing_stop:
    enabled: true
    threshold: 0.10           # 持仓期峰值回撤 10% 强平
  concentration:
    enabled: true
    # 等权 N 只时单票约 1/N；N=5 需 ≥0.20，略放宽以覆盖一手取整
    max_weight: 0.22
  portfolio_drawdown:
    enabled: true
    threshold: 0.15           # 组合净值从峰值回撤 15% 熔断全平
    cooldown_days: 20         # 熔断后 20 个交易日禁止买入

universe:
  source: hs300
