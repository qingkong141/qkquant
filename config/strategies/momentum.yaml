name: momentum
description: 绝对动量 + 风控层追踪止损（每日扫描，仓位上限 10）

params:
  mom_window: 20
  entry_threshold: 0.03       # 过去 20 日 +3% 入场
  exit_threshold: -0.03       # 过去 20 日 -3% 信号反转离场
  drawdown_from_peak: 0.10    # 当前价距 20 日最高不能低于 90%
  max_positions: 10
  min_price: 1.0

# 风控层（组合级 + 单票级）；trailing_stop 原先内置在策略里，现已下放。
risk:
  trailing_stop:
    enabled: true
    threshold: 0.12           # 持仓期峰值回撤 12% 强平
  concentration:
    enabled: true
    max_weight: 0.15          # 单票市值占比不超过 15%
  portfolio_drawdown:
    enabled: true
    threshold: 0.20           # 组合净值从峰值回撤 20% 熔断全平
    cooldown_days: 20         # 熔断后 20 个交易日禁止买入

universe:
  source: hs300
