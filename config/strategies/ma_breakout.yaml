name: ma_breakout
description: 双均线突破策略（5 日线上穿 20 日线买入，下穿卖出）

params:
  fast: 5
  slow: 20
  stop_loss_pct: 0.05      # 跌破慢线 5% 止损
  trend_period: 60          # 趋势过滤 MA 周期（价格必须站上才买）
  trend_filter: true        # 启用趋势过滤
  vol_period: 5             # 量能过滤 MA 周期
  volume_filter: true       # 启用放量过滤（要求当日量 > 均量）
  adx_threshold: 20            # ADX 趋势强度过滤：<20 视为震荡市，禁止买入；0=关闭
  cooldown_days: 20            # 卖出后 N 天内不得重新买入同一只票；0=关闭
  adx_market_filter: true      # True=仅在 HS300<MA60 时启用 ADX，多头时不拦截

# 风控层（组合级 + 单票级）
risk:
  trailing_stop:
    enabled: true
    threshold: 0.12          # 持仓期峰值回撤 12% 强平
  concentration:
    enabled: true
    max_weight: 0.15         # 单票市值占比不超过 15%
  portfolio_drawdown:
    enabled: true
    threshold: 0.20          # 组合净值从峰值回撤 20% 熔断全平
    cooldown_days: 20

universe:
  source: "hs300"          # 沪深 300 成分股
  max_positions: 10
  position_sizing: "equal" # 等权
